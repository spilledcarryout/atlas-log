<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atlas Training Log</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Trebuchet MS','Segoe UI',sans-serif;background:#F4F1EC;color:#1A1A1A;min-height:100vh}
input,select,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const LS = {
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

const PRESETS = [
  "KB Swing","KB Snatch","KB Clean & Press","TGU","KB Goblet Squat",
  "Pull-Up Bar Hang","Pull-Up","Chin-Up","Dead Hang",
  "Farmers Carry","Suitcase Carry","Overhead Carry","Bear Hug Carry",
  "Zercher Carry","Sandbag Carry","KB Carry","Yoke Carry",
  "Ruck","Rucking","HIIT Trampoline","Yoga","Mobility","Wim Hof Breathing"
];
const DIST_UNITS=["ft","yd","m","km","mi"];
const UNIT_MAP={
  "Pull-Up Bar Hang":{metric:"Duration",unit:"min",hasWeight:true,isDistance:false},
  "Dead Hang":{metric:"Duration",unit:"min",hasWeight:true,isDistance:false},
  "Pull-Up":{metric:"Reps",unit:"reps",hasWeight:false,isDistance:false},
  "Chin-Up":{metric:"Reps",unit:"reps",hasWeight:false,isDistance:false},
  "Ruck":{metric:"Distance",unit:"km",hasWeight:true,isDistance:true},
  "Rucking":{metric:"Distance",unit:"km",hasWeight:true,isDistance:true},
  "Farmers Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "Suitcase Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "Overhead Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "Bear Hug Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "Zercher Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "Sandbag Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "KB Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "Yoke Carry":{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true},
  "HIIT Trampoline":{metric:"Duration",unit:"min",hasWeight:false,isDistance:false},
  "Yoga":{metric:"Duration",unit:"min",hasWeight:false,isDistance:false},
  "Mobility":{metric:"Duration",unit:"min",hasWeight:false,isDistance:false},
  "Wim Hof Breathing":{metric:"Rounds",unit:"rds",hasWeight:false,isDistance:false}
};
const CARRY_KW=["carry","zercher","yoke","sandbag"];
const DUR_KW=["hang","plank","hold"];
function norm(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim()}
function getUi(ex,customDist=[]){
  if(UNIT_MAP[ex])return UNIT_MAP[ex];
  const n=norm(ex);
  const k=Object.keys(UNIT_MAP).find(k=>norm(k)===n);
  if(k)return UNIT_MAP[k];
  if(customDist.some(e=>norm(e)===n))return{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true};
  if(CARRY_KW.some(w=>n.includes(w)))return{metric:"Distance",unit:"ft",hasWeight:true,isDistance:true};
  if(DUR_KW.some(w=>n.includes(w)))return{metric:"Duration",unit:"min",hasWeight:true,isDistance:false};
  return{metric:"Reps",unit:"reps",hasWeight:true,isDistance:false};
}
function today(){return new Date().toISOString().split("T")[0]}
function blank(ex="KB Swing"){
  return{date:today(),exercise:ex,sets:"",repsPerSide:"",value:"",distanceUnit:"ft",weight:"",weightUnit:"lbs",notes:""}
}

// ── Default Iron Express template ────────────────────────────────────────────
const DEFAULT_TEMPLATES = [
  {
    id:"iron-express",
    name:"Iron Express",
    goal:"Complete all 6 rounds of KB Snatch @ 62 lbs → advance swings to 80 lbs",
    entries:[
      {exercise:"KB Swing", sets:6, repsPerSide:5, value:10, weight:72, weightUnit:"lbs", notes:"Single arm 5/side"},
      {exercise:"KB Snatch", sets:2, repsPerSide:5, value:10, weight:53, weightUnit:"lbs", notes:"Light rounds 1–2"},
      {exercise:"KB Snatch", sets:4, repsPerSide:5, value:10, weight:62, weightUnit:"lbs", notes:"Heavy 28kg rounds 3–6"},
    ]
  }
];

const SEED={id:1741219200000,date:"2026-03-06",exercise:"Pull-Up Bar Hang",sets:1,value:15,distanceUnit:"min",weight:30,weightUnit:"lbs",notes:"Weighted hang with 30 lb ruck"};

const RESOURCES=[
  {tag:"KB · YouTube",title:"Mark Wildman — KB Programming",desc:"Swing/snatch/TGU progressions",url:"https://www.youtube.com/@MarkWildman"},
  {tag:"Hang · YouTube",title:"Antranik — Dead Hang Progressions",desc:"Shoulder health, grip, weighted hang",url:"https://www.youtube.com/watch?v=_V7FJMfb2tE"},
  {tag:"Carry · YouTube",title:"Starting Strongman — Farmers Carry",desc:"Technique, loading, distance programming",url:"https://www.youtube.com/@StartingStrongman"},
  {tag:"Ruck · YouTube",title:"GORUCK — Rucking Fundamentals",desc:"Load, pace, cadence, weekly volume",url:"https://www.youtube.com/@GORUCKofficial"},
  {tag:"Mobility",title:"GMB Fitness — Movement & Mobility",desc:"Strength and flexibility protocols",url:"https://www.youtube.com/@GMBFitness"},
  {tag:"Metabolic",title:"Dr. Robert Lustig",desc:"Nutritional and mitochondrial science",url:"https://www.youtube.com/@robertlustigmd"}
];

// ── SVG Line Chart ───────────────────────────────────────────────────────────
function LineChart({data,showWeight=false,label="Value"}){
  const W=540,H=180,P={t:16,r:20,b:32,l:44};
  const iW=W-P.l-P.r,iH=H-P.t-P.b;
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d.value);
  const minV=Math.min(...vals),maxV=Math.max(...vals),rng=maxV-minV||1;
  const wx=showWeight?data.map(d=>d.weight||0):[];
  const minW=showWeight?Math.min(...wx):0,maxW=showWeight?Math.max(...wx)||1:1,rngW=maxW-minW||1;
  const px=i=>P.l+i*(iW/(data.length-1));
  const py=v=>P.t+iH-((v-minV)/rng)*iH;
  const pwy=v=>P.t+iH-((v-minW)/rngW)*iH;
  const pts=data.map((d,i)=>`${px(i)},${py(d.value)}`).join(" ");
  const wpts=showWeight?data.map((d,i)=>`${px(i)},${pwy(d.weight||0)}`).join(" "):null;
  const ticks=Array.from({length:5},(_,i)=>minV+(rng/4)*i);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block"}}>
      {ticks.map((v,i)=>(
        <g key={i}>
          <line x1={P.l} y1={py(v)} x2={W-P.r} y2={py(v)} stroke="#E5DFD5" strokeWidth="1"/>
          <text x={P.l-6} y={py(v)+4} textAnchor="end" fontSize="10" fill="#AAA">{Math.round(v)}</text>
        </g>
      ))}
      {data.map((d,i)=>(
        <text key={i} x={px(i)} y={H-6} textAnchor="middle" fontSize="9" fill="#AAA">{d.date}</text>
      ))}
      {showWeight&&wpts&&<polyline points={wpts} fill="none" stroke="#2563EB" strokeWidth="1.5" strokeDasharray="4 2"/>}
      <polyline points={pts} fill="none" stroke="#C4621A" strokeWidth="2"/>
      {data.map((d,i)=><circle key={i} cx={px(i)} cy={py(d.value)} r="4" fill="#C4621A"/>)}
      {showWeight&&data.map((d,i)=><circle key={"w"+i} cx={px(i)} cy={pwy(d.weight||0)} r="3" fill="#2563EB"/>)}
      <rect x={P.l} y={4} width="10" height="10" fill="#C4621A" rx="2"/>
      <text x={P.l+14} y={13} fontSize="10" fill="#888">{label}</text>
      {showWeight&&<><rect x={P.l+80} y={4} width="10" height="10" fill="#2563EB" rx="2"/><text x={P.l+94} y={13} fontSize="10" fill="#888">Load</text></>}
    </svg>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App(){
  const [logs,setLogs]=useState([]);
  const [view,setView]=useState("log");
  const [form,setForm]=useState(blank());
  const [filterEx,setFilterEx]=useState("KB Swing");
  const [saved,setSaved]=useState(false);
  const [editId,setEditId]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [customEx,setCustomEx]=useState([]);
  const [customDistEx,setCustomDistEx]=useState([]);
  const [showAddEx,setShowAddEx]=useState(false);
  const [newExName,setNewExName]=useState("");
  const [newExIsDist,setNewExIsDist]=useState(false);
  const [templates,setTemplates]=useState(DEFAULT_TEMPLATES);
  const [templateLogged,setTemplateLogged]=useState(false);

  useEffect(()=>{
    let stored=LS.get("atlas-logs")||[];
    if(!stored.some(l=>l.id===SEED.id))stored=[SEED,...stored];
    setLogs(stored);
    setCustomEx(LS.get("atlas-custom-ex")||[]);
    setCustomDistEx(LS.get("atlas-custom-dist-ex")||[]);
    const saved=LS.get("atlas-templates");
    if(saved)setTemplates(saved);
  },[]);

  function persist(updated){setLogs(updated);LS.set("atlas-logs",updated)}
  const allEx=[...PRESETS,...customEx];
  const fui=getUi(form.exercise,customDistEx);

  function handleSubmit(){
    const v=Number(form.value);
    if(!form.exercise||!v)return;
    const ui=getUi(form.exercise,customDistEx);
    const entry={
      id:Date.now(),date:form.date,exercise:form.exercise,
      sets:Number(form.sets)||1,
      repsPerSide:Number(form.repsPerSide)||0,
      value:v,
      distanceUnit:ui.isDistance?form.distanceUnit:ui.unit,
      weight:Number(form.weight)||0,weightUnit:form.weightUnit,notes:form.notes
    };
    persist([entry,...logs].sort((a,b)=>b.date.localeCompare(a.date)));
    setSaved(true);setTimeout(()=>setSaved(false),2000);
    setForm(f=>({...blank(f.exercise),distanceUnit:f.distanceUnit,weightUnit:f.weightUnit}));
  }

  function logTemplate(template){
    const d=today();
    const newEntries=template.entries.map((e,i)=>{
      const ui=getUi(e.exercise,customDistEx);
      return{
        id:Date.now()+i,date:d,exercise:e.exercise,
        sets:e.sets,repsPerSide:e.repsPerSide||0,value:e.value,
        distanceUnit:ui.isDistance?"ft":ui.unit,
        weight:e.weight,weightUnit:e.weightUnit,notes:e.notes
      };
    });
    persist([...newEntries,...logs].sort((a,b)=>b.date.localeCompare(a.date)));
    setTemplateLogged(true);setTimeout(()=>setTemplateLogged(false),3000);
  }

  function updateTemplateWeight(templateId,entryIdx,newWeight){
    const updated=templates.map(t=>{
      if(t.id!==templateId)return t;
      const entries=t.entries.map((e,i)=>i===entryIdx?{...e,weight:Number(newWeight)}:e);
      return{...t,entries};
    });
    setTemplates(updated);LS.set("atlas-templates",updated);
  }

  function deleteLog(id){persist(logs.filter(l=>l.id!==id))}

  function startEdit(log){
    setEditId(log.id);
    const ui=getUi(log.exercise,customDistEx);
    setEditForm({date:log.date,exercise:log.exercise,sets:log.sets,
      repsPerSide:log.repsPerSide||0,value:log.value,
      distanceUnit:ui.isDistance?(log.distanceUnit||ui.unit):ui.unit,
      weight:log.weight,weightUnit:log.weightUnit||"lbs",notes:log.notes||""});
  }

  function saveEdit(){
    const ui=getUi(editForm.exercise,customDistEx);
    persist(logs.map(l=>l.id!==editId?l:{
      ...l,date:editForm.date,exercise:editForm.exercise,
      sets:Number(editForm.sets)||1,repsPerSide:Number(editForm.repsPerSide)||0,
      value:Number(editForm.value)||0,
      distanceUnit:ui.isDistance?editForm.distanceUnit:ui.unit,
      weight:Number(editForm.weight)||0,weightUnit:editForm.weightUnit,notes:editForm.notes
    }).sort((a,b)=>b.date.localeCompare(a.date)));
    setEditId(null);
  }

  function addCustomExercise(){
    const name=newExName.trim();
    if(!name||allEx.includes(name))return;
    const updEx=[...customEx,name];setCustomEx(updEx);LS.set("atlas-custom-ex",updEx);
    if(newExIsDist){const d=[...customDistEx,name];setCustomDistEx(d);LS.set("atlas-custom-dist-ex",d)}
    setForm(f=>({...f,exercise:name,distanceUnit:newExIsDist?"ft":f.distanceUnit}));
    setNewExName("");setNewExIsDist(false);setShowAddEx(false);
  }

  function removeCustomExercise(name){
    const e=customEx.filter(x=>x!==name);setCustomEx(e);LS.set("atlas-custom-ex",e);
    const d=customDistEx.filter(x=>x!==name);setCustomDistEx(d);LS.set("atlas-custom-dist-ex",d);
  }

  function dispUnit(log){
    const ui=getUi(log.exercise,customDistEx);
    if(ui.isDistance)return(log.distanceUnit&&log.distanceUnit!=="reps")?log.distanceUnit:ui.unit;
    return ui.unit;
  }

  function dispEntry(log){
    const unit=dispUnit(log);
    const rps=log.repsPerSide>0?` (${log.repsPerSide}/side)`:"";
    const setsStr=log.sets>1?`${log.sets}× `:"";
    const load=log.weight>0?` @ ${log.weight}${log.weightUnit}`:"";
    return `${setsStr}${log.value}${unit}${rps}${load}`;
  }

  const chartData=logs.filter(l=>l.exercise===filterEx)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .map(l=>({date:l.date.slice(5),value:l.value,weight:l.weight}));
  const fltUi=getUi(filterEx,customDistEx);

  const S=styles;
  return(
    <div style={S.root}>
      {/* Header */}
      <div style={S.header}>
        <div>
          <div style={S.headerTitle}>ATLAS TRAINING LOG</div>
          <div style={S.headerSub}>Dr. Carlos Barrios · Metabolic Performance</div>
        </div>
        <div style={S.entryCount}>{logs.length} entries</div>
      </div>

      {/* Nav */}
      <div style={S.nav}>
        {["log","templates","history","progress"].map(v=>(
          <button key={v} style={{...S.navBtn,...(view===v?S.navActive:{})}} onClick={()=>setView(v)}>
            {v.toUpperCase()}
          </button>
        ))}
      </div>

      {/* ── TEMPLATES ── */}
      {view==="templates"&&(
        <div style={S.panel}>
          <div style={S.sectionTitle}>WORKOUT TEMPLATES</div>
          {templates.map(t=>(
            <div key={t.id} style={S.templateCard}>
              <div style={S.templateHeader}>
                <div style={S.templateName}>{t.name}</div>
                <button
                  style={{...S.submitBtn,...(templateLogged?{background:"#2E7D32"}:{})}}
                  onClick={()=>logTemplate(t)}>
                  {templateLogged?"✓ LOGGED TODAY":"▶ LOG TODAY"}
                </button>
              </div>
              {t.goal&&(
                <div style={S.goalBanner}>
                  <span style={S.goalIcon}>🎯</span>
                  <span style={S.goalText}>{t.goal}</span>
                </div>
              )}
              <div style={S.templateEntries}>
                {t.entries.map((e,i)=>(
                  <div key={i} style={S.templateRow}>
                    <div style={S.templateRowLeft}>
                      <div style={S.templateExercise}>{e.exercise}</div>
                      <div style={S.templateMeta}>
                        {e.sets} sets × {e.repsPerSide?`${e.repsPerSide}/side`:`${e.value} reps`}
                        {e.notes&&<span style={{color:"#BBB",marginLeft:8}}>{e.notes}</span>}
                      </div>
                    </div>
                    <div style={S.templateWeightEdit}>
                      <input
                        type="number"
                        style={S.weightInput}
                        value={e.weight}
                        onChange={ev=>updateTemplateWeight(t.id,i,ev.target.value)}
                      />
                      <span style={{fontSize:10,color:"#999",marginLeft:4}}>{e.weightUnit}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
          <div style={{marginTop:16,fontSize:11,color:"#BBB",letterSpacing:"0.05em"}}>
            Tap ▶ LOG TODAY to instantly log all exercises with today's date. Edit the load fields above to adjust weights before logging.
          </div>
        </div>
      )}

      {/* ── LOG ── */}
      {view==="log"&&(
        <div style={S.panel}>
          <div style={S.sectionTitle}>NEW ENTRY</div>
          <div style={S.grid2}>
            <div style={S.field}>
              <label style={S.label}>DATE</label>
              <input type="date" style={S.input} value={form.date}
                onChange={e=>setForm(f=>({...f,date:e.target.value}))}/>
            </div>
            <div style={S.field}>
              <label style={S.label}>EXERCISE</label>
              <div style={{display:"flex",gap:6}}>
                <select style={{...S.input,flex:1}} value={form.exercise}
                  onChange={e=>setForm(f=>({...f,exercise:e.target.value}))}>
                  {allEx.map(ex=><option key={ex} value={ex}>{ex}</option>)}
                </select>
                <button style={S.addExBtn} onClick={()=>setShowAddEx(v=>!v)}>+</button>
              </div>
              {showAddEx&&(
                <div style={S.addExPanel}>
                  <input type="text" style={{...S.input,marginBottom:6}}
                    placeholder="e.g. Trap Bar Deadlift"
                    value={newExName} onChange={e=>setNewExName(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addCustomExercise()} autoFocus/>
                  <label style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:"#888",marginBottom:8,cursor:"pointer"}}>
                    <input type="checkbox" checked={newExIsDist} onChange={e=>setNewExIsDist(e.target.checked)}/>
                    Measured by distance
                  </label>
                  <div style={{display:"flex",gap:6}}>
                    <button style={S.saveBtn} onClick={addCustomExercise}>ADD TO LIST</button>
                    <button style={S.cancelBtn} onClick={()=>{setShowAddEx(false);setNewExName("");setNewExIsDist(false)}}>CANCEL</button>
                  </div>
                  {customEx.length>0&&(
                    <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #EDE8E0"}}>
                      {customEx.map(ex=>(
                        <div key={ex} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #F0EBE3"}}>
                          <span style={{fontSize:12,color:"#444"}}>{ex}</span>
                          <button style={{background:"none",border:"none",color:"#CCC",cursor:"pointer"}} onClick={()=>removeCustomExercise(ex)}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
            <div style={S.field}>
              <label style={S.label}>SETS</label>
              <input type="number" style={S.input} placeholder="1" value={form.sets}
                onChange={e=>setForm(f=>({...f,sets:e.target.value}))}/>
            </div>
            <div style={S.field}>
              <label style={S.label}>REPS / SIDE (optional)</label>
              <input type="number" style={S.input} placeholder="e.g. 5" value={form.repsPerSide}
                onChange={e=>setForm(f=>({...f,repsPerSide:e.target.value}))}/>
            </div>
            <div style={S.field}>
              <label style={S.label}>{fui.metric.toUpperCase()} ({fui.isDistance?form.distanceUnit:fui.unit})</label>
              <input type="number" style={S.input} placeholder="0" value={form.value}
                onChange={e=>setForm(f=>({...f,value:e.target.value}))}/>
            </div>
            {fui.isDistance&&(
              <div style={S.field}>
                <label style={S.label}>DISTANCE UNIT</label>
                <select style={S.input} value={form.distanceUnit}
                  onChange={e=>setForm(f=>({...f,distanceUnit:e.target.value}))}>
                  {DIST_UNITS.map(u=><option key={u} value={u}>{u}</option>)}
                </select>
              </div>
            )}
            {fui.hasWeight&&(
              <>
                <div style={S.field}>
                  <label style={S.label}>LOAD</label>
                  <input type="number" style={S.input} placeholder="0" value={form.weight}
                    onChange={e=>setForm(f=>({...f,weight:e.target.value}))}/>
                </div>
                <div style={S.field}>
                  <label style={S.label}>LOAD UNIT</label>
                  <select style={S.input} value={form.weightUnit}
                    onChange={e=>setForm(f=>({...f,weightUnit:e.target.value}))}>
                    <option>lbs</option><option>kg</option>
                  </select>
                </div>
              </>
            )}
          </div>
          <div style={S.field}>
            <label style={S.label}>NOTES</label>
            <input type="text" style={S.input} placeholder="e.g. felt strong, RPE 3..." value={form.notes}
              onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/>
          </div>
          <button style={{...S.submitBtn,...(saved?{background:"#2E7D32"}:{})}} onClick={handleSubmit}>
            {saved?"✓ LOGGED":"LOG ENTRY"}
          </button>

          {logs.filter(l=>l.date===today()).length>0&&(
            <div style={S.todayBox}>
              <div style={S.sectionTitle}>TODAY — {new Date().toDateString().toUpperCase()}</div>
              {logs.filter(l=>l.date===today()).map(l=>(
                <div key={l.id} style={S.todayEntry}>
                  <span style={{fontSize:13,fontWeight:600,flex:"1 1 140px"}}>{l.exercise}</span>
                  <span style={{color:"#C4621A",fontSize:13,fontWeight:600}}>{dispEntry(l)}</span>
                  {l.notes&&<span style={{color:"#999",fontSize:11,width:"100%",fontStyle:"italic"}}>{l.notes}</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── HISTORY ── */}
      {view==="history"&&(
        <div style={S.panel}>
          <div style={S.sectionTitle}>TRAINING HISTORY</div>
          {logs.length===0&&<div style={S.empty}>No entries yet.</div>}
          {logs.map(l=>{
            const isEd=editId===l.id;
            const eui=getUi(editForm.exercise||l.exercise,customDistEx);
            return(
              <div key={l.id} style={{...S.hRow,...(isEd?S.hRowEd:{})}}>
                {isEd?(
                  <div style={{width:"100%"}}>
                    <div style={S.grid2}>
                      <div style={S.field}><label style={S.label}>DATE</label>
                        <input type="date" style={S.input} value={editForm.date}
                          onChange={e=>setEditForm(f=>({...f,date:e.target.value}))}/></div>
                      <div style={S.field}><label style={S.label}>EXERCISE</label>
                        <select style={S.input} value={editForm.exercise}
                          onChange={e=>setEditForm(f=>({...f,exercise:e.target.value}))}>
                          {allEx.map(ex=><option key={ex} value={ex}>{ex}</option>)}</select></div>
                      <div style={S.field}><label style={S.label}>SETS</label>
                        <input type="number" style={S.input} value={editForm.sets}
                          onChange={e=>setEditForm(f=>({...f,sets:e.target.value}))}/></div>
                      <div style={S.field}><label style={S.label}>REPS / SIDE</label>
                        <input type="number" style={S.input} value={editForm.repsPerSide}
                          onChange={e=>setEditForm(f=>({...f,repsPerSide:e.target.value}))}/></div>
                      <div style={S.field}>
                        <label style={S.label}>{eui.metric.toUpperCase()}</label>
                        <input type="number" style={S.input} value={editForm.value}
                          onChange={e=>setEditForm(f=>({...f,value:e.target.value}))}/></div>
                      {eui.isDistance&&<div style={S.field}><label style={S.label}>DISTANCE UNIT</label>
                        <select style={S.input} value={editForm.distanceUnit}
                          onChange={e=>setEditForm(f=>({...f,distanceUnit:e.target.value}))}>
                          {DIST_UNITS.map(u=><option key={u} value={u}>{u}</option>)}</select></div>}
                      {eui.hasWeight&&<>
                        <div style={S.field}><label style={S.label}>LOAD</label>
                          <input type="number" style={S.input} value={editForm.weight}
                            onChange={e=>setEditForm(f=>({...f,weight:e.target.value}))}/></div>
                        <div style={S.field}><label style={S.label}>LOAD UNIT</label>
                          <select style={S.input} value={editForm.weightUnit}
                            onChange={e=>setEditForm(f=>({...f,weightUnit:e.target.value}))}>
                            <option>lbs</option><option>kg</option></select></div>
                      </>}
                    </div>
                    <div style={S.field}><label style={S.label}>NOTES</label>
                      <input type="text" style={S.input} value={editForm.notes}
                        onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))}/></div>
                    <div style={{display:"flex",gap:10,marginTop:8,alignItems:"center"}}>
                      <button style={S.saveBtn} onClick={saveEdit}>✓ SAVE</button>
                      <button style={S.cancelBtn} onClick={()=>setEditId(null)}>CANCEL</button>
                      <button style={{...S.delBtn,marginLeft:"auto"}} onClick={()=>deleteLog(l.id)}>DELETE</button>
                    </div>
                  </div>
                ):(
                  <>
                    <div style={{fontSize:11,color:"#AAA",minWidth:80}}>{l.date}</div>
                    <div style={{fontSize:13,color:"#1A1A1A",flex:1,minWidth:120,fontWeight:500}}>{l.exercise}</div>
                    <div style={{fontSize:13,color:"#C4621A",fontWeight:600,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      {dispEntry(l)}
                    </div>
                    {l.notes&&<div style={{fontSize:11,color:"#BBB",width:"100%",fontStyle:"italic"}}>{l.notes}</div>}
                    <button style={S.editBtn} onClick={()=>startEdit(l)}>✎</button>
                    <button style={S.delBtn} onClick={()=>deleteLog(l.id)}>✕</button>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── PROGRESS ── */}
      {view==="progress"&&(
        <div style={S.panel}>
          <div style={S.sectionTitle}>PROGRESS TRACKING</div>
          <div style={S.field}>
            <label style={S.label}>SELECT EXERCISE</label>
            <select style={S.input} value={filterEx} onChange={e=>setFilterEx(e.target.value)}>
              {[...new Set(logs.map(l=>l.exercise))].map(ex=>(
                <option key={ex} value={ex}>{ex}</option>
              ))}
            </select>
          </div>
          {chartData.length<2?(
            <div style={S.empty}>Log at least 2 sessions to see a trend.</div>
          ):(
            <>
              <div style={{fontSize:11,color:"#AAA",letterSpacing:"0.1em",marginBottom:12}}>
                {filterEx} — {fltUi.metric} over time
              </div>
              <div style={{background:"#fff",border:"1px solid #E5DFD5",borderRadius:8,padding:"16px 8px 8px",marginBottom:16}}>
                <LineChart data={chartData} label={fltUi.metric} showWeight={fltUi.hasWeight}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                {[
                  {l:"Sessions",v:chartData.length},
                  {l:"Personal Best",v:Math.max(...chartData.map(d=>d.value))},
                  {l:"Max Load",v:`${Math.max(...chartData.map(d=>d.weight||0))} lbs`},
                  {l:"Trend",hi:true,v:(()=>{
                    if(chartData.length<2)return"—";
                    const p=((chartData.at(-1).value-chartData[0].value)/chartData[0].value*100).toFixed(0);
                    return `${p>0?"+":""}${p}%`;
                  })()}
                ].map(c=>(
                  <div key={c.l} style={{background:"#fff",border:"1px solid #E5DFD5",borderRadius:6,padding:"12px 8px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#BBB",letterSpacing:"0.1em",marginBottom:6,fontWeight:600}}>{c.l}</div>
                    <div style={{fontSize:15,fontWeight:700,color:c.hi?"#C4621A":"#1A1A1A"}}>{c.v}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      )}

      {/* Resources */}
      <div style={{padding:"24px",maxWidth:700,margin:"0 auto",borderTop:"1px solid #E5DFD5",marginTop:8}}>
        <div style={S.sectionTitle}>TRAINING RESOURCES</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
          {RESOURCES.map(r=>(
            <a key={r.title} href={r.url} target="_blank" rel="noreferrer"
              style={{display:"block",background:"#fff",border:"1px solid #E5DFD5",borderRadius:6,padding:14,textDecoration:"none"}}>
              <div style={{fontSize:9,color:"#C4621A",letterSpacing:"0.12em",marginBottom:5,fontWeight:600}}>{r.tag}</div>
              <div style={{fontSize:12,color:"#1A1A1A",fontWeight:600,marginBottom:4,lineHeight:1.4}}>{r.title}</div>
              <div style={{fontSize:10,color:"#999",lineHeight:1.5}}>{r.desc}</div>
            </a>
          ))}
        </div>
      </div>
    </div>
  );
}
